<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quadratic Formula Calculator
    </title>
</head>

<body>

    <header>

        <h1>Quadratic Formula Calculator
        </h1>

    </header>

    <!-- User Input -->
    <section>
        <p>ax<sup>2</sup>+ bx + c = 0</p>

        <form action="">

            <label for="a">a = </label>
            <input type="number" id="a" , required>

            <label for="b">b = </label>
            <input type="number" id="b" , required>

            <label for="c">c = </label>
            <input type="number" id="c" , required>

            <button type="submit" id="submitButton">Calculate</button>
            <button type="reset">Clear</button>

            <p id="result">Solution:</p>


        </form>
    </section>

    <!-- Formula Info -->
    <section>
        <p>x = -b&plusmn;&radic;b<sup>2</sup>-4ac&frasl;2a</p>
        <p>where a ≠ 0</p>
    </section>

    <script src="app.js"></script>
</body>

</html>
